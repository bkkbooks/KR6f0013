body:
  text: 西天譯經三藏朝散大夫試鴻臚卿傳法大師臣施護奉詔譯如是我聞一時佛在王舍城鷲峯山中與大苾芻衆千二百五十人俱復有菩薩摩訶薩衆五千人俱得大忍辱無礙辨才降伏魔怨制諸外道發大道心得三摩地總持自在具四無礙智通達四攝及最上甚深波羅蜜多乃至一切佛法無量無邊諸善功德其名曰普賢菩薩普眼菩薩普觀菩薩普光菩薩普照菩薩上意菩薩增意菩薩無邊意菩薩廣意菩薩無盡意菩薩持地菩薩世上菩薩勝意菩薩最上意菩薩總持自在王菩薩文殊師利菩薩摩訶薩等復有賢護菩薩摩訶薩等十六人俱復有娑婆世界主大梵天王及帝釋天主護世四大天王復有蘇尸彌天子安意天子及諸天王龍王緊那囉王巘馱哩嚩王藥叉王誐嚕拏王等各與若干百千眷屬俱來會坐爾時世尊坐於吉祥藏師子之座四衆圍繞逾於須彌光明熾盛譬如日月普照一切世間威儀具足梵行寂靜譬如帝釋於諸天中威儀最勝亦如輪王七寶具足離諸怖畏如師子王善能談説諸法空義如大火聚破諸幽暗如摩尼寶王遠照一切如是佛光照於三千大千一切世界於其光中出妙梵音告諸衆生我今所得一切諸法最上波羅蜜説真實義初善中善後善文義殊勝純白圓滿梵行清淨純一無雜爾時喜王菩薩摩訶薩在大衆中安詳而坐瞻仰世尊於師子座放大光明譬如千日照耀一切心大歡喜深信恭敬即從座起合掌向佛以頌讚曰佛身晃曜如金山利益世間甚希有菩薩聲聞緣覺僧天龍八部皆圍繞譬如須彌諸天居出於大海而高顯悲愍衆生而現身放百千光常照曜行梵天行即梵天於彼梵天復為王行禪解脫三摩地光照上位諸菩薩亦如帝釋為天主威德儀容諸相異牟尼光明照世間相好莊嚴功德異金輪四洲得自在能善調伏諸有情引彼衆生出苦輪我佛慈悲亦如是所有火光摩尼光日月光等諸光明如是百千日等光不及佛日恆照曜如月夜分放光明普照世間悉清淨佛面端嚴如滿月映蔽一切光不現譬如高山燃大火能破夜暗顯諸方大仙所有智慧光破盡黑暗離諸有如大師子曠野吼衆獸聞之悉驚怖佛説法空無我義諸魔聞之亦如是摩尼寶王放光明諸餘摩尼光不現佛身晃曜真金色映蔽一切世間光一切世間賢聖中無有最上與佛等具福精進方便智一切功德不可量瞻仰大師功德海威光普照諸群生一心恭敬慕尊顏是故我今頭面禮我所讚佛歸敬心世間功德無等等盡將回向法界中一切世間成佛道爾時喜王菩薩摩訶薩讚歎佛已合掌向佛瞻仰尊顏目不暫捨心觀法界其義甚深難知難見離言分別絶諸戲論微妙難解不可思議如是觀想一切法界唯佛如來觀智攝受現量證知佛之境界無有等等如是觀見所有如來不可思議方便境界皆攝一相法界性中譬如虛空無有住處即衆生界亦如自性一切諸法亦復如是無礙解脫究竟寂靜諸佛世尊以善方便身變佛剎遍滿一切現衆生前諸如來身經無數俱胝劫而不可得時喜王菩薩摩訶薩如是觀佛功德已默然而住爾時有一尊者名曰護國於舍衛大城安居三月過是夏已著衣持鉢與諸苾芻及初出家者初發心者出舍衛國詣王舍城鷲峯山中到彼山已即時護國尊者往詣佛所頭面禮足右繞三匝住立一面合掌恭敬而説此頌讚歎佛曰稽首最上佛光明稽首如空無礙意稽首能斷諸結縛稽首永超三有海我佛無邊真色相普遍俱胝剎土中菩薩聞已歡喜來恭敬供養佛功德作此最上供養已聽牟尼法離諸塵各生歡喜還本土稱讚世尊所説法廣歷俱胝無數劫利樂一切諸有情如是身心不疲倦為求無上佛菩提恆行布施持戒行忍辱精進禪定門智慧方便到涅盤是故我禮大覺尊成就六通四神足諸根十力解脫門以此行及諸衆生我今禮佛無等智能知一切世間心所行所作所成業所有身口及言説無上世尊悉觀見貪癡過失不能斷衆生因彼墮三有因佛得成善逝業能知世間諸善惡所有過去諸佛事及彼現在天人師乃至未來功德海一切諸法悉能知清淨剎土衆圍繞菩薩緣覺與聲聞乃至諸佛壽較量我佛一切悉能知所有一切生滅法所有供養作佛事所有受持法藏法我佛一切悉能知佛有十力無礙智現在常住於三世如是一切方便法我禮世尊智慧海大覺世尊無等等相好莊嚴大吉祥如夜衆星現空中我禮牟尼最上尊色相端嚴無與等光照諸天及世間帝釋梵王究竟天對彼佛前俱不現無垢不動如金山右旋螺髻紺滋潤佛頂高顯如金山光明遠照生諸福光遍俱胝那由他顯現眉間白毫相目若青蓮恆適悅觀照世間運慈心清淨滿月虛空中佛面圓明亦如是一切見者無厭足我禮如來圓滿相行如鵝王及鹿王亦如牛王行步穩振動大地無暫止我禮如來堅固力手指纖長網縵相指甲清淨如赤銅平立垂手過於膝我禮金色大覺尊佛行大地現好相具足顯現千輻輪足放光明照群生蒙光悉得生天界大聖法王施七財能為施主心平等調御世間依法行我禮法王無上覺慈悲法念心為劒持戒方便智慧弓能斷煩惱諸群賊生滅輪回無有增自利果滿復利他令彼衆生亦解脫究竟安樂出塵勞得入善逝寂靜宗無生無滅無諸苦亦無生老愛別離如是無為最上乘佛為衆生慈愍説我讚最上大牟尼攝盡一切諸佛法如是所有諸功德願諸衆生證菩提爾時尊者護國頌讚佛已偏袒右肩右膝著地合掌向佛恭敬頂禮白佛言世尊如來應正等覺我有所問唯願世尊慈悲聽許爾時世尊告尊者護國言如汝所問我為汝説滿所求願令生歡喜時尊者護國聞佛語已身心適悅而發聲言世尊有何等法為菩薩行法具足能得一切最上功德無礙大智決定辨才明了性相入一切智教化衆生斷彼無明妄想煩惱決定真實入一切智發真實語令彼有情依言所作離諸愚暗念佛方便樂聞一切甚深梵義受持諸法速得證於無上正智爾時尊者護國即於佛前而説頌曰菩薩所行決定行彼行必有真實法真法從佛智海生最上如來為我説佛身光明黃金相最上無邊大福聚救度六趣諸衆生為説菩薩無垢行何得無盡大覺智總持甘露生菩提何得清淨智慧海彼慧能斷衆生疑俱胝多劫輪回苦衆生迷沒意無疲覩此愚迷苦惱侵為彼云何修十善剎土清淨衆會滿實剎無邊壽命長為衆恆宣微妙言願説菩提無垢行降伏邪魔生正見枯彼愛河證解脫清淨法眼照愚盲令諸有情行上行端嚴富貴大辨才言辭柔軟聞歡喜譬如甘露潤世間願説甚深微妙法梵音深妙斷諸惡其聲和雅如頻伽求法之衆佛所集願説甘露濟群生衆有菩提最上根及彼聲聞緣覺性願佛隨根方便説師資遇會正是時我今樂聞最上乘唯佛知我菩提性於此小乘不樂求願説如來第一法爾時尊者護國説此頌已佛言善哉善哉尊者能問如來最上之義利益多人令得安樂攝受未來諸菩薩摩訶薩汝今諦聽善思念之我當為説時尊者護國白言善哉世尊我今樂聽唯願説之爾時世尊告尊者護國言有四種法具足清淨是名菩薩摩訶薩何等四法一內二外三心四意如是四法稱理真實見諸衆生其心平等猶若虛空無所分別依言所行是名菩薩摩訶薩四種之法獲得清淨爾時世尊重説頌曰心意內外常清淨不退菩提正道心所作之善無唐捐能得菩薩無邊智觀彼衆生苦無我生老病死悉來侵如是三有大海中廣運法船救群品見諸衆生心平等觀彼世間如一子願令一切俱解脫悉向菩提心不退常談空義依空行亦無人我無衆生譬如夢幻等無實令彼愚迷生智慧如所宣説大覺智依智而行所作事調伏過失心寂靜求證菩提為佛子爾時世尊説此頌已告尊者護國言復有四種法於諸菩薩令心安慰何等四法一者於總持法門志求修學二者常近善友威儀無缺三者求證甚深無生法忍四者精進修行持戒清淨如是四法令彼菩薩安慰其心進修不退復説頌曰若人愛敬總持法名聞遠響衆所歸能持無上妙法門一切如來同所説智慧增明無忘失如是速得無礙智通達一切最上法成就無為解脫門皆因善友證菩提出生七覺能修斷增長八正作佛事遠離惡友如怖火聞甚深法證無生能了諸法畢竟空無我無人無衆生如是永離一切見律儀出生諸善本堅持守護離破犯彼行能成寂靜心佛為衆生親演説爾時世尊説此頌已告尊者護國言復有四種法於諸菩薩在輪回中令心愛樂何等四法一者令諸菩薩愛樂見佛二者令諸菩薩愛樂説法三者令諸菩薩愛樂能捨一切所有四者令諸菩薩愛樂忍印無相深法如是四法於諸菩薩在輪回中深生愛樂復説頌曰菩薩得見二足尊一切生中行正行能善調伏諸世間光明普照除愚暗如是供養人中尊深生愛樂常尊重救度一切諸衆生令入菩提無上道若聞諸佛所説法身心寂靜生愛樂如是堅固心無退依行速證佛菩提能捨一切心無吝見來求者生歡喜國城妻子及身命給施衆生作佛因若聞無相甚深法性離分別本來空無我無人無衆生如是於斯生愛樂爾時世尊説此頌已告尊者護國言復有四種法於諸菩薩不得愛樂何等四法一者於其在家不得愛樂二者既出家已不得愛樂利養三者不得愛樂上族中生四者不得愛樂小乘之人如是四法於諸菩薩不得愛樂復説頌曰在家無邊大過失捨離令心無所著常樂山野寂諸根勇猛勤修大智德獨行清淨如利劒能斷愚癡諸垢染於彼種種大利養常樂遠離無愛著棄捨高貴上種族觀如幻化陽焰等普為群生行布施持戒忍辱等諸行不惜身命及眷屬志求正覺到彼岸於小乘法無所著於最上乘恆堅固乃至割截於身體其心不壞如金剛爾時世尊説此頌已告尊者護國言復有四種法於諸菩薩而有損減何等四法一者破犯戒律二者不住山野而趣寂靜三者不依四乘之教邪妄推求四者雖樂多聞全無所得如是四法於諸菩薩而有損減復説頌曰戒相清淨如摩尼能引衆生到彼岸菩薩於斯破律儀迷沒不成無上覺住持山野寂靜處我人分別自然除男女眷屬及己身觀如草木無情愛四乘教理無虛誑一心清淨奉教行必得具足衆功德成就佛智大丈夫觀彼輪回諸有情常處生死憂悲苦恆運最上妙法船度彼有情出苦海若無救度彼衆生迷沒沈淪無有盡是故小乘非究竟為生令發菩提心爾時世尊説此頌已告尊者護國言復有四種法於諸菩薩明了修習何等四法一者發生諸佛平等之心而求善逝二者承事法師尊重供養於臥具等而不愛著三者不貪利養亦無所求四者於甚深法忍具足成就如是四法明了修習復説頌曰彼有善逝大丈夫天上人間無有等平等導引諸群生如是修習行十善尊重承事於法師依師教授而修學作大供養求佛智無邊諸佛亦此生常住深山無所畏於斯利養不生貪善能成就無礙智通達深法離諸塵聞佛功德深歡喜如是行法堅固修證彼寂靜無生忍廣度衆生無量苦爾時世尊説此頌已告尊者護國言復有四種法於諸菩薩行法清淨何等四法一者身心決定志求菩提行法清淨二者離諸虛妄樂住深山行法清淨三者一切能捨不求果報行法清淨四者常隨法師晝夜求法行法清淨如是四法於諸菩薩行法清淨復説頌曰貪瞋癡垢心皆盡懈怠虛妄亦復無一切過失令不生決定求證菩提道厭離本舍憂根斷捨彼俗塵求出家諸惡朋友不相逢行住深山趣解脫於彼山中修淨行能成如來無礙智於身命財無所著自在無畏如師子見彼有情生歡喜譬如飛鳥聚還離觀彼世間非久居如是求大菩提道身心清淨如虛空所捨一切無驚怖於彼利養無愛著如鹿心驚不住地世間恆處大嶮難難發身心求解脫覩此虛妄無真實是故我行寂靜行恆以軟語誘群生怨親平等無分別無著無住亦如風是求菩薩最上行無相解脫空無願了彼有為如幻化常行清淨廣大心飲甘露味常歡喜志求道法依師學彼人五蘊恆清淨衆苦逼迫無疲勞如是證入總持門解此所修菩薩行成就所求令彼喜若人不求於菩提彼即少智百生失爾時世尊説此頌已告尊者護國言復有四種法於諸菩薩而為難法何等四法一者心不尊重多行輕慢二者心無孝行懈怠背逆三者心貪利養少於知足四者心樂虛妄邪求財利如是四法為菩薩難法復説頌曰佛法本師及父母全無信重多輕慢不行孝敬心懈怠常以愚癡行散亂一向貪心於利養復行虛妄為邪利自讚德業誣他人我能持戒及修行互相鬪諍無慈愍覆藏己過見他非復行農業及經營如是沙門無功德末法之時人散亂鬪諍相殺心嫉妬沙門隱滅如來法諸善苾芻皆遠離菩提妙道永不逢五趣輪回無有窮爾時世尊説此頌已告尊者護國言復有四種法於諸菩薩宜應遠離何等四法一者懈怠二者不信三者嫉妬四者憎見他人如是四法宜應遠離復説頌曰無信懈怠心愚迷心懷嫉妬常瞋恚見有沙門持忍辱却行驅擯出伽藍於彼世間貴賤人都無分別善惡事一向只行於是非如是過失從瞋得遠離佛法諸功德墮入惡趣大火坑如是所行惡趣行不依教法獲斯苦是故常行菩提道無令淪沒惡趣生利益有情大金仙多劫俱胝方出世今時暫得遇牟尼速捨諸過求解脫爾時世尊説此頌已告尊者護國言有四種法於諸菩薩不應行何等四法一者惡友補特伽羅不應行二者有見補特伽羅不應行三者捨一切善法補特伽羅不應行四者樂著財利補特伽羅不應行如是四種補特伽羅不應行復説頌曰若人遠離諸惡友常得善友來親近如夜圓月現當空除暗明顯菩提道凡有所見常不斷於己身命偏養育如是毒氣能遠離彼人成佛大智慧若捨最上微妙法不樂寂靜甘露味如是名為不淨器遠離求證大菩提貪求財利衣鉢等復與在家同營事如是遠離此火坑而能成就最上道常樂降伏諸魔怨恆轉法輪度群品如是廣作大利益常逢善友得菩提親踈毀讚常平等利養嫉妬亦復然如是無上諸佛智彼人不久悉成就爾時世尊説此頌已告尊者護國言復有四種法於諸菩薩為苦報法何等四法一者輕慢教法二者執著我人三者心無信解四者於不淨境具足印持如是四法為菩薩苦報法復説頌曰若有受持微妙法堪受世間諸供養於彼輕慢無大智當受無邊衆惡苦於佛本師及父母常懷人我不恭敬如是大福心不求當得不淨無知處三寶最上良福田而無信解行歸敬純以虛誑昧世間如是當獲罪惡苦女人即是惡趣門流浪生死無窮盡無智愚癡作彼業永沈地獄及畜趣若人尊重向諸佛能滅衆苦得無畏復閉一切惡趣門開引衆生得佛道
